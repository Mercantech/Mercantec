# Dokploy-deploy: docker compose up -d --build
#
# Routing via direkte Cloudflare-tunnel (apex-domæne mercantec.tech):
#   Tunnel ingress: mercantec.tech → http://localhost:4040
#
# Ingen Traefik-labels — apex-domænet routes ikke via Dokploy Traefik Host()-rules.

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PUBLIC_AUTH_BASE_URL: ${PUBLIC_AUTH_BASE_URL:-https://auth.mercantec.tech}
        PUBLIC_AUTH_CLIENT_ID: ${PUBLIC_AUTH_CLIENT_ID:-demo}
        PUBLIC_AUTH_ISSUER: ${PUBLIC_AUTH_ISSUER:-https://auth.mercantec.tech}
        PUBLIC_AUTH_AUDIENCE: ${PUBLIC_AUTH_AUDIENCE:-mercantec-apps}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PUBLISH_PORT:-4040}:4040"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:4040/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
