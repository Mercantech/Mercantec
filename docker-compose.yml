# Dokploy-deploy: docker compose up -d --build
#
# Routing (Mercantec — samme mønster som UptimeDaddy):
#   1. Cloudflare: mercantec.tech (CNAME → tunnel)
#   2. Tunnel ingress: *.mercantec.tech → http://localhost:80
#   3. Traefik (Dokploy): Host(`mercantec.tech`) → container-port
#
# Lokal udvikling med host-port:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up --build

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.mercantec-web.rule=Host(`${FRONTEND_DOMAIN:-mercantec.tech}`)
      - traefik.http.routers.mercantec-web.entrypoints=web
      - traefik.http.routers.mercantec-web.service=mercantec-web
      - traefik.http.services.mercantec-web.loadbalancer.server.port=5173
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5173/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  dokploy-network:
    external: true
