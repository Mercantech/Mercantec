server {
    listen 4040;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/html;
    gzip_min_length 256;

    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # OAuth token-proxy — undgår CORS ved browser-fetch fra SPA
    location /api/oauth/ {
        proxy_pass https://auth.mercantec.tech/oauth/;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host auth.mercantec.tech;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
